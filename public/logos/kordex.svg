<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1600"
  height="1000"
  viewBox="0 0 1600 1000"
  fill="none"
>
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0b3f25"/>
      <stop offset="45%" stop-color="#061611"/>
      <stop offset="100%" stop-color="#010403"/>
    </radialGradient>

    <linearGradient id="shipGreen" x1="230" y1="190" x2="1200" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eaff9c"/>
      <stop offset="20%" stop-color="#77ff63"/>
      <stop offset="55%" stop-color="#00d93f"/>
      <stop offset="100%" stop-color="#008b2d"/>
    </linearGradient>

    <linearGradient id="shipDark" x1="230" y1="180" x2="1140" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#13391c"/>
      <stop offset="40%" stop-color="#08651f"/>
      <stop offset="100%" stop-color="#021d0d"/>
    </linearGradient>

    <linearGradient id="beamGradient" x1="760" y1="430" x2="1460" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b8ff8a" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#3cff58" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ff80" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="360" y1="730" x2="1260" y2="730" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b9ff55"/>
      <stop offset="45%" stop-color="#37ef58"/>
      <stop offset="100%" stop-color="#13b640"/>
    </linearGradient>

    <filter id="greenGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          0 0 0 0 0.10
          0 0 0 0 1.00
          0 0 0 0 0.25
          0 0 0 0.95 0"
        result="coloredBlur"
      />
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          0 0 0 0 0.10
          0 0 0 0 1.00
          0 0 0 0 0.30
          0 0 0 0.85 0"
        result="coloredBlur"
      />
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bgGradient)"/>

  <!-- Subtle tech background -->
  <g opacity="0.28">
    <path d="M0 430H180L245 500H390" stroke="#0cff63" stroke-width="1"/>
    <path d="M0 520H260L330 590H500" stroke="#0cff63" stroke-width="1"/>
    <path d="M1600 430H1420L1355 500H1210" stroke="#0cff63" stroke-width="1"/>
    <path d="M1600 540H1335L1260 610H1090" stroke="#0cff63" stroke-width="1"/>
    <circle cx="180" cy="430" r="4" fill="#0cff63"/>
    <circle cx="260" cy="520" r="4" fill="#0cff63"/>
    <circle cx="1420" cy="430" r="4" fill="#0cff63"/>
    <circle cx="1335" cy="540" r="4" fill="#0cff63"/>
  </g>

  <!-- Energy beam -->
  <g filter="url(#strongGlow)" opacity="0.9">
    <path
      d="M730 410 C930 370 1160 420 1490 555
         C1150 510 915 505 690 455 Z"
      fill="url(#beamGradient)"
    />
    <path
      d="M705 455 C930 420 1160 455 1500 650
         C1135 575 920 555 690 500 Z"
      fill="url(#beamGradient)"
      opacity="0.55"
    />
    <path d="M760 435L1500 565" stroke="#5cff5f" stroke-width="4" opacity="0.75"/>
    <path d="M770 485L1450 650" stroke="#0fff66" stroke-width="3" opacity="0.55"/>
    <path d="M810 405L1430 520" stroke="#b6ff88" stroke-width="2" opacity="0.55"/>
  </g>

  <!-- Softadastra text inside beam -->
  <text
    x="1015"
    y="560"
    transform="rotate(13 1015 560)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="70"
    font-weight="800"
    fill="#d8ffd0"
    opacity="0.82"
    filter="url(#greenGlow)"
  >
    Softadastra
  </text>

  <!-- Main spaceship group -->
  <g filter="url(#greenGlow)">
    <!-- Saucer shadow -->
    <ellipse
      cx="510"
      cy="280"
      rx="350"
      ry="92"
      transform="rotate(-2 510 280)"
      fill="#031007"
      opacity="0.95"
    />

    <!-- Saucer body -->
    <path
      d="M170 286
         C220 170 522 150 790 205
         C940 236 985 300 880 334
         C704 392 345 374 207 324
         C174 312 160 300 170 286Z"
      fill="url(#shipDark)"
      stroke="url(#shipGreen)"
      stroke-width="8"
    />

    <!-- Saucer inner light -->
    <path
      d="M300 270
         C410 205 620 200 765 235
         L662 330
         C540 325 400 305 300 270Z"
      fill="#dfffd1"
      opacity="0.92"
      stroke="#70ff67"
      stroke-width="4"
    />

    <!-- Saucer rim lines -->
    <path
      d="M190 276 C298 196 622 178 835 230"
      stroke="#caffb5"
      stroke-width="5"
      stroke-linecap="round"
      opacity="0.9"
    />
    <path
      d="M215 250 C345 190 610 185 790 220"
      stroke="#3aff54"
      stroke-width="4"
      stroke-linecap="round"
      opacity="0.9"
    />
    <path
      d="M250 230 C395 178 610 180 760 210"
      stroke="#d7ffb8"
      stroke-width="3"
      stroke-linecap="round"
      opacity="0.8"
    />

    <!-- Small dots on saucer -->
    <g fill="#d8ffc8">
      <circle cx="225" cy="262" r="5"/>
      <circle cx="245" cy="252" r="4"/>
      <circle cx="270" cy="243" r="4"/>
      <circle cx="300" cy="235" r="4"/>
      <circle cx="330" cy="228" r="4"/>
    </g>

    <!-- Kordex text on saucer -->
    <text
      x="420"
      y="295"
      transform="rotate(-3 420 295)"
      font-family="Arial, Helvetica, sans-serif"
      font-size="46"
      font-weight="800"
      fill="#092b16"
    >
      Kordex
    </text>

    <!-- Center connector -->
    <circle cx="555" cy="350" r="34" fill="#07220d" stroke="#7dff67" stroke-width="7"/>
    <ellipse cx="555" cy="350" rx="18" ry="8" fill="#e8ffd9"/>

    <!-- Neck -->
    <path
      d="M590 360
         L735 390
         L830 470
         L690 510
         L560 395Z"
      fill="url(#shipDark)"
      stroke="#5cff5e"
      stroke-width="6"
    />

    <!-- Main hull -->
    <path
      d="M650 420
         C790 390 965 405 1170 490
         L1035 585
         C850 560 700 535 570 480
         Z"
      fill="url(#shipDark)"
      stroke="url(#shipGreen)"
      stroke-width="7"
    />

    <!-- Hull panels -->
    <path d="M735 442L1030 505" stroke="#b3ff87" stroke-width="5" opacity="0.8"/>
    <path d="M720 485L965 545" stroke="#25ff5a" stroke-width="5" opacity="0.75"/>
    <path d="M820 420L915 520" stroke="#7bff65" stroke-width="5" opacity="0.8"/>
    <path d="M880 430L750 520" stroke="#34ff6a" stroke-width="4" opacity="0.65"/>

    <!-- Top rear engine -->
    <path
      d="M940 288
         C1015 285 1110 340 1160 390
         L1055 405
         C1005 365 965 340 920 335
         Z"
      fill="url(#shipDark)"
      stroke="#78ff69"
      stroke-width="6"
    />

    <path d="M980 315L1090 380" stroke="#d6ffc5" stroke-width="6" opacity="0.85"/>
    <path d="M1015 305L1125 375" stroke="#43ff68" stroke-width="4" opacity="0.85"/>

    <!-- Front lower nacelle -->
    <path
      d="M635 505
         C760 500 915 525 1035 580
         C910 625 730 615 615 565
         C585 550 590 515 635 505Z"
      fill="url(#shipDark)"
      stroke="#59ff5e"
      stroke-width="7"
    />

    <circle cx="650" cy="542" r="48" fill="#0d501f" stroke="#a6ff75" stroke-width="7"/>
    <circle cx="650" cy="542" r="30" fill="#b8ff89" filter="url(#strongGlow)"/>

    <!-- Lower support -->
    <path
      d="M575 395
         L660 510
         L620 525
         L525 405Z"
      fill="#073514"
      stroke="#63ff62"
      stroke-width="5"
    />

    <!-- Glow pixels and streaks -->
    <g fill="#afff8d" opacity="0.85">
      <rect x="845" y="450" width="18" height="6" rx="3"/>
      <rect x="885" y="462" width="24" height="6" rx="3"/>
      <rect x="930" y="478" width="16" height="6" rx="3"/>
      <rect x="985" y="494" width="28" height="7" rx="3"/>
      <rect x="1080" y="520" width="20" height="6" rx="3"/>
      <rect x="1125" y="540" width="18" height="6" rx="3"/>
    </g>
  </g>

  <!-- Small motion particles -->
  <g opacity="0.65" fill="#4dff63" filter="url(#softBlur)">
    <circle cx="1030" cy="420" r="3"/>
    <circle cx="1090" cy="450" r="3"/>
    <circle cx="1160" cy="475" r="2.5"/>
    <circle cx="1220" cy="510" r="3"/>
    <circle cx="1300" cy="545" r="2.5"/>
    <circle cx="1380" cy="585" r="2"/>
  </g>

  <!-- Brand name -->
  <g filter="url(#greenGlow)">
    <text
      x="800"
      y="790"
      text-anchor="middle"
      font-family="Arial Black, Impact, Arial, Helvetica, sans-serif"
      font-size="150"
      font-weight="900"
      letter-spacing="24"
      fill="url(#textGradient)"
      stroke="#9cff8b"
      stroke-width="2"
    >
      KORDEX
    </text>

    <path
      d="M470 850H1130"
      stroke="#36ff5f"
      stroke-width="4"
      opacity="0.55"
      filter="url(#strongGlow)"
    />
  </g>
</svg>
