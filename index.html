    <style>
      :root {
        --sa-bg: #12372f;
        --sa-bg-deep: #0b2b22;
        --sa-orange: #d57a2a;
        --sa-orange-strong: #e29a55;
        --sa-cream: #f6d6aa;
      }

      html {
        background: var(--sa-bg-deep);
      }

      body {
        background:
          radial-gradient(
            circle at 50% 6%,
            rgba(246, 222, 184, 0.86) 0%,
            rgba(222, 174, 111, 0.34) 18%,
            rgba(18, 55, 47, 0.88) 43%,
            rgba(11, 43, 34, 1) 100%
          ),
          linear-gradient(180deg, #1a4439 0%, #12372f 42%, #0b2b22 100%);

        background-attachment: fixed;
      }

      #app-loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(
            circle at 50% 8%,
            rgba(246, 222, 184, 0.78) 0%,
            rgba(222, 174, 111, 0.28) 20%,
            rgba(18, 55, 47, 0.9) 45%,
            rgba(11, 43, 34, 1) 100%
          ),
          linear-gradient(180deg, #1a4439 0%, #12372f 44%, #0b2b22 100%);
        z-index: 9999;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 180ms ease,
          visibility 0ms linear 180ms;
      }

      #app-loading::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;

        background:
          linear-gradient(
            165deg,
            transparent 0%,
            transparent 36%,
            rgba(213, 122, 42, 0.24) 37%,
            rgba(226, 154, 85, 0.18) 43%,
            transparent 50%
          ),
          linear-gradient(
            18deg,
            transparent 0%,
            transparent 68%,
            rgba(213, 122, 42, 0.22) 69%,
            rgba(226, 154, 85, 0.16) 75%,
            transparent 81%
          );
      }

      #app-loading::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;

        background-image: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.016) 0px,
          rgba(255, 255, 255, 0.016) 1px,
          transparent 1px,
          transparent 4px
        );

        opacity: 0.3;
        mix-blend-mode: soft-light;
      }

      #app-loading.is-hiding {
        opacity: 0;
        visibility: hidden;
      }

      .sa-dots {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .sa-dots span {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: linear-gradient(
          180deg,
          var(--sa-orange-strong),
          var(--sa-orange)
        );
        opacity: 0.28;
        transform: translateY(0);
        animation: saDot 1.2s ease-in-out infinite;
        box-shadow:
          0 10px 28px rgba(0, 0, 0, 0.35),
          0 0 24px rgba(213, 122, 42, 0.22);
      }

      .sa-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .sa-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes saDot {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.28;
        }

        40% {
          transform: translateY(-10px);
          opacity: 0.96;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .sa-dots span {
          animation: none;
          opacity: 0.68;
        }
      }
    </style>

    <div id="app-loading" aria-label="Loading">

    <div id="app"></div>

    <script type="module" src="/src/main.js"></script>
    <script>
      window.addEventListener("load", function () {
        const loader = document.getElementById("app-loading");

        if (!loader) {
          return;
        }

        loader.classList.add("is-hiding");

        window.setTimeout(function () {
          loader.remove();
        }, 220);
      });
    </script>
